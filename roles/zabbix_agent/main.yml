---
- name: Download and Install Zabbix Agent
  ansible.windows.win_package:
    path: "https://cdn.zabbix.com/zabbix/binaries/stable/7.0/7.0.0/zabbix_agent-7.0.0-windows-amd64-openssl.msi"
    state: present
    arguments:
      - /quiet
      - /qn
      - SERVER=192.168.50.139
      - LISTENPORT=10050
      - SERVERACTIVE=192.168.50.139 
      - HOSTNAME={{ ansible_hostname }}

- name: Open Zabbix Agent port in Firewall
  community.windows.win_firewall_rule:
    name: Zabbix_Agent_Inbound
    localport: 10050
    action: allow
    direction: in
    protocol: tcp
    profiles: [domain, private]
    state: present

- name: Ensure Zabbix Agent service is running
  ansible.windows.win_service:
    name: "Zabbix Agent"
    state: started
    start_mode: auto