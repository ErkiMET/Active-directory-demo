---
- name: Confirm Dev Department OU exists
  microsoft.ad.ou:
    name: "Dev Department"
    path: "{{ domain_path }}"
    state: present

- name: Create Employee accounts in AD
  microsoft.ad.user:
    name: "{{ item.name }}"
    firstname: "{{ item.firstname }}"
    surname: "{{ item.lastname }}"
    upn: "{{ item.firstname | lower }}.{{ item.lastname | lower }}@{{ new_domain }}"
    password: "{{ vault_default_user_password }}"
    update_password: on_create
    password_never_expires: yes
    path: "OU=Dev Department,{{ domain_path }}"
    state: present
  loop: "{{ employees }}"

- name: Create computer objects in AD
  microsoft.ad.computer:
    name: "{{ item.name }}"
    sam_account_name: "{{ item.name }}"
    path: "OU=Dev Department,{{ domain_path }}"
    state: present
  loop: "{{ workstations }}"